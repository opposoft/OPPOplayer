    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
            --accent-color: #ff4757;
            --hover-color: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container { display: flex; flex: 1; overflow: hidden; }

        .player-section {
            flex: 1; display: flex; flex-direction: column;
            background-color: #000; position: relative;
        }

        video { width: 100%; height: 100%; outline: none; background: #000; }

        .top-overlay {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }

        .now-playing {
            background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 5px;
            font-size: 0.9rem; display: flex; align-items: center; gap: 10px; pointer-events: auto;
            backdrop-filter: blur(5px);
        }

		.right-controls {
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			gap: 8px;
		}

		/* Новый стиль для логотипа справа */
		#nowPlayingLogo {
			width: 24px; 
			height: 24px; 
			border-radius: 4px; 
			object-fit: contain; 
			background: #fff; 
			padding: 2px;
		}

        .quality-selector {
            background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid #444;
            padding: 8px 12px; border-radius: 5px; font-size: 0.9rem; outline: none;
            cursor: pointer; pointer-events: auto; display: none; backdrop-filter: blur(5px);
        }

		.sidebar {
			width: 320px; background-color: var(--surface-color);
			display: flex; flex-direction: column; border-left: 1px solid #333;
			min-height: 0;
		}

        .tabs { 
            display: flex; 
            flex-wrap: wrap;
            border-bottom: 1px solid #333; 
        }
        .tab {
            flex: 1 1 45%;
            padding: 12px 5px;
            text-align: center; 
            cursor: pointer;
            color: var(--text-muted); 
            font-size: 0.95rem;
            font-weight: 500; 
            transition: 0.2s;
            user-select: none;
        }
        .tab.active { 
            color: var(--accent-color); 
            border-bottom: 2px solid var(--accent-color); 
        }

		.channel-list { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }
        .channel-item {
            padding: 10px 15px; margin-bottom: 5px; border-radius: 5px; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center;
        }
        .channel-item:hover { background-color: var(--hover-color); }
        .channel-item.active {
            background-color: rgba(255, 71, 87, 0.1); color: var(--accent-color);
            border-left: 3px solid var(--accent-color);
        }

        .channel-logo { width: 32px; height: 32px; border-radius: 6px; margin-right: 12px; object-fit: contain; flex-shrink: 0; }
        .channel-name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; flex: 1; border-left: none; }
            .player-section { flex: none; height: 30vh; }
        }

		.player-placeholder {
			position: absolute;
			inset: 0;
			z-index: 20;
			display: flex;
			align-items: center;
			justify-content: center;
			
			background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0a 100%);
			
			transition: opacity 0.6s ease, visibility 0.6s ease;
		}

		.player-placeholder.hidden {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		.placeholder-content {
			text-align: center;
			z-index: 2;
		}

		.tv-icon {
			position: relative;
			display: inline-block;
			margin-bottom: 0px;
			animation: float 3s ease-in-out infinite;
		}

		/* Корпуса без тени */
		.tv-icon svg .tv-body,
		.tv-icon svg .radio-body {
			stroke: #ff4757;
		}

		/* Мигающие точки на антеннах */
		.tv-icon svg .antenna-dot {
			animation: blink 1.5s ease-in-out infinite;
		}

		.placeholder-title {
			font-size: 1.4rem;
			font-weight: 600;
			color: #fff;
			margin-bottom: 8px;
			letter-spacing: 0.5px;
		}

		.placeholder-subtitle {
			font-size: 0.9rem;
			color: #666;
		}

		@keyframes float {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-10px); }
		}

		@keyframes blink {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.3; }
		}
		
        .search-container {
            padding: 10px;
            border-bottom: 1px solid #333;
            background-color: var(--surface-color);
        }
        
        #searchInput {

            padding: 8px 12px;

            color: var(--text-color);

        }

		.fav-btn {
			background: none;
			border: none;
			color: #666;
			font-size: 1.2rem;
			cursor: pointer;
			padding: 0 5px;
			margin-left: auto;
			transition: 0.2s;
		}
		.fav-btn:hover { color: var(--accent-color); transform: scale(1.1); }
		.fav-btn.active { color: #f1c40f;}
    </style>
</head>

		        // --- СОХРАНЕНИЕ ГРОМКОСТИ ---

        // --- ЛОГИКА СКЛЕЙКИ ---
        function createMasterBlob(videoUrl, audioUrl) {
            const masterPlaylist = [
                '#EXTM3U',
                '#EXT-X-VERSION:3',
                `#EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Main Audio",DEFAULT=YES,AUTOSELECT=YES,URI="${audioUrl}"`,
                `#EXT-X-STREAM-INF:BANDWIDTH=5000000,RESOLUTION=1280x720,AUDIO="audio"`,
                videoUrl
            ].join('\n');

            const blob = new Blob([masterPlaylist], { type: 'application/vnd.apple.mpegurl' });
            return URL.createObjectURL(blob);
        }

        // --- ЗАГРУЗКА ПОТОКА ---
		function loadStream(streamData, isRawAudio = false) {
			let finalUrl = "";
			
			// Если пришел объект {v, a}, клеим его в Blob
			if (typeof streamData === 'object' && streamData !== null) {
				finalUrl = createMasterBlob(streamData.v, streamData.a);
			} else {
				finalUrl = streamData;
			}

			// Всегда очищаем HLS плеер перед переключением, чтобы звук не накладывался
			if (hls) {
				hls.destroy();
				hls = null;
			}

			if (isRawAudio) {
				// Если это обычный аудиопоток (TBS), отдаем его напрямую в тег video
				videoElement.src = finalUrl;
				videoElement.play().catch(() => {});
			} else {
				// Если это обычное ТВ или HLS-радио (Радио Свобода)
				if (Hls.isSupported()) {
					hls = new Hls();
					hls.loadSource(finalUrl);
					hls.attachMedia(videoElement);
					hls.on(Hls.Events.MANIFEST_PARSED, () => videoElement.play().catch(() => {}));
				} 
				else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
					videoElement.src = finalUrl;
				}
			}
		}

        function getBestQualityKey(keys, savedPref) {
            if (!savedPref) return keys[0];
            if (keys.includes(savedPref)) return savedPref;
            const resMatch = savedPref.match(/\d{3,4}/);
            if (resMatch) {
                for (let key of keys) if (key.includes(resMatch[0])) return key;
            }
            return keys[0];
        }

        // --- ВЫБОР КАНАЛА ---
        function updateMediaSession(channel) {
            // Векторный логотип ОППО для плеера
            const oppoLogo = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='50%25' y='50%25' fill='%23ff4757' font-size='26' font-family='sans-serif' font-weight='bold' text-anchor='middle' dy='.3em'%3EОППО%3C/text%3E%3C/svg%3E";
            
            const artworkSrc = channel.logo || oppoLogo;

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: channel.name,
                    artist: 'ОППО',
                    artwork: [
                        { src: artworkSrc, sizes: '96x96', type: 'image/svg+xml' },
                        { src: artworkSrc, sizes: '512x512', type: 'image/svg+xml' }
                    ]
                });
            }
        }

        // --- ВЫБОР КАНАЛА ---
		function playChannel(channel, element) {
			videoElement.crossOrigin = "anonymous";
			document.getElementById('playerPlaceholder').classList.add('hidden');
			currentActiveChannel = channel;
			document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
			if(element) element.classList.add('active');

			nowPlayingText.textContent = channel.name;
			nowPlayingLogo.src = channel.logo || defaultLogo;
			nowPlayingLogo.style.display = 'block';
			topOverlay.style.opacity = 1;

			updateMediaSession(channel);
			// Проверка: это радио?
			const isRadio = channel.isRawAudio || (channels.radio && channels.radio.some(r => r.name === channel.name));

			if (isRadio) {
				initAudioVisualizer();
				canvas.style.display = 'block';
				drawVisualizer();
			} else {
				canvas.style.display = 'none';
			}
	
			// ЕСЛИ ЭТО YOUTUBE
			if (channel.isYouTube) {
				// Выключаем обычный видеоплеер
				videoElement.style.display = 'none';
				if (hls) { hls.destroy(); hls = null; }
				videoElement.pause();
				videoElement.removeAttribute('src');
				videoElement.load();

				// Прячем выбор качества (в Ютубе он встроенный)
				qualitySelector.style.display = 'none';

				// Включаем iframe
				youtubeElement.style.display = 'block';
				youtubeElement.src = channel.url;
			} 
			// ЕСЛИ ЭТО ОБЫЧНОЕ ТВ ИЛИ РАДИО
			else {
				// Выключаем Ютуб (чтобы не играл звук на фоне)
				youtubeElement.style.display = 'none';
				youtubeElement.src = ''; 

				// Включаем обычный видеоплеер
				videoElement.style.display = 'block';

				let streams = channel.streams || { "Авто": channel.url };
				qualitySelector.innerHTML = ''; 
				const qualityKeys = Object.keys(streams);

				if (qualityKeys.length > 1) {
					qualitySelector.style.display = 'block';
					qualityKeys.forEach(key => {
						const option = document.createElement('option');
						option.value = key; 
						option.textContent = key;
						qualitySelector.appendChild(option);
					});
				} else {
					qualitySelector.style.display = 'none';
				}

				const savedQuality = localStorage.getItem('savedUserQuality');
				const bestKey = getBestQualityKey(qualityKeys, savedQuality);
				
				qualitySelector.value = bestKey;
				// Тут передаем флаг isRawAudio из предыдущего решения (для радио)
				loadStream(streams[bestKey], channel.isRawAudio);
			}
		}

        // --- ПЕРЕКЛЮЧЕНИЕ КАЧЕСТВА ---
        qualitySelector.addEventListener('change', function(e) {
            const key = e.target.value;
            localStorage.setItem('savedUserQuality', key);
            if (currentActiveChannel) {
                const streams = currentActiveChannel.streams || { "Авто": currentActiveChannel.url };
                loadStream(streams[key], currentActiveChannel.isRawAudio);
            }
        });

		function renderChannels(type) {
			channelListElement.innerHTML = ''; 
			let channelsToRender = [];

			if (type === 'favorites') {
				const allChannels = [].concat(...Object.values(channels));
				channelsToRender = allChannels.filter(ch => favoriteChannels.includes(ch.name))
											  .filter((v, i, a) => a.findIndex(t => (t.name === v.name)) === i);
				if (channelsToRender.length === 0) {
					channelListElement.innerHTML = '<div style="padding: 20px; color: #666; text-align: center; font-size: 0.9rem;">Список избранного пуст.</div>';
					return;
				}
			} else if (type === 'search') {
				// Логика для поиска
				const allChannels = [].concat(...Object.values(channels));
				const uniqueChannels = allChannels.filter((v, i, a) => a.findIndex(t => (t.name === v.name)) === i);
				
				channelsToRender = uniqueChannels.filter(ch => ch.name.toLowerCase().includes(searchQuery));
				
				if (channelsToRender.length === 0) {
					channelListElement.innerHTML = '<div style="padding: 20px; color: #666; text-align: center; font-size: 0.9rem;">Ничего не найдено</div>';
					return;
				}
			} else {
				channelsToRender = channels[type];
			}

			channelsToRender.forEach((channel) => {
				const div = document.createElement('div');
				div.className = 'channel-item';
				if (currentActiveChannel && currentActiveChannel.name === channel.name) {
					div.classList.add('active');
				}
						
				const img = document.createElement('img');
				img.className = 'channel-logo';
				img.src = channel.logo || defaultLogo;
				img.onerror = function() { if (this.src !== defaultLogo) this.src = defaultLogo; };

				const span = document.createElement('span');
				span.className = 'channel-name';
				span.textContent = channel.name;

				// --- Кнопка Избранного ---
				const isFav = favoriteChannels.includes(channel.name);
				const favBtn = document.createElement('button');
				favBtn.className = 'fav-btn' + (isFav ? ' active' : '');
				favBtn.innerHTML = isFav ? '★' : '☆';
				
				favBtn.onclick = (e) => {
					e.stopPropagation(); // ВАЖНО: чтобы при клике на звезду канал не начинал играть
					toggleFavorite(channel.name, type);
				};

				div.appendChild(img);
				div.appendChild(span);
				div.appendChild(favBtn); // Добавляем звездочку
				
				div.onclick = () => playChannel(channel, div);
				channelListElement.appendChild(div);
			});
		}

        function switchTab(type) {
            // Очищаем поиск при переходе по вкладкам
            document.getElementById('searchInput').value = '';
            searchQuery = ''; 
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            renderChannels(type);

        // Интерфейс
        let timeout;
        const resetOverlayTimer = () => {
            topOverlay.style.opacity = 1;
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                if (document.activeElement !== qualitySelector) topOverlay.style.opacity = 0;
            }, 3000);
        };
        document.querySelector('.player-section').onmousemove = resetOverlayTimer;
        document.querySelector('.player-section').onclick = resetOverlayTimer;

        // --- ЛОГИКА ЭКВАЛАЙЗЕРА ---
        let audioContext, analyser, source, animationId;
        const canvas = document.getElementById('audioVisualizer');
        const canvasCtx = canvas.getContext('2d');

        function initAudioVisualizer() {
            if (!audioContext) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContext();
                    analyser = audioContext.createAnalyser();
                    source = audioContext.createMediaElementSource(videoElement);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    analyser.fftSize = 256;
                } catch (e) { console.log("Ошибка аудио:", e); }
            }
            if (audioContext.state === 'suspended') audioContext.resume();
        }

        function drawVisualizer() {
            if (canvas.style.display === 'none') {
                cancelAnimationFrame(animationId);
                return;
            }
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            // 1. Находим центр экрана
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const draw = () => {
                if (canvas.style.display === 'none') return;
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 2. Рассчитываем ширину, чтобы влезло в половину экрана
                const barWidth = (centerX / bufferLength) * 2.5; 
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * (canvas.height * 0.6); // Высота
                    
                    // Делаем прозрачность зависимой от громкости (эффект неона)
                    canvasCtx.fillStyle = `rgba(255, 71, 87, ${dataArray[i] / 255})`;
                    
                    // 3. Рисуем СИММЕТРИЧНО от центра
                    // Правая сторона
                    canvasCtx.fillRect(centerX + x, centerY - barHeight / 2, barWidth, barHeight);
                    // Левая сторона (зеркально)
                    canvasCtx.fillRect(centerX - x - barWidth, centerY - barHeight / 2, barWidth, barHeight);
                    
                    x += barWidth;
                }
            };
            draw();
        }
